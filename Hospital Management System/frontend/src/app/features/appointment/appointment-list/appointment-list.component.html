<div class="appointment-container">

  <!-- New Appointment Button -->
  <button class="btn btn-primary btn-sm mb-2" (click)="openAdd()">New Appointment</button>

  <!-- Table -->
  <ag-grid-angular
    class="ag-theme-alpine"
    style="width: 100%; height: 400px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [pagination]="true"
    rowSelection="multiple"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>

  <!-- Form Modal (New / Edit) -->
  <div class="modal fade show" tabindex="-1" [ngClass]="{'d-block': showForm}" style="background-color: rgba(0,0,0,0.4);" *ngIf="showForm">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ selected ? 'Edit Appointment' : 'New Appointment' }}</h5>
          <button type="button" class="btn-close" (click)="showForm = false"></button>
        </div>
        <div class="modal-body">
          <app-appointment-form
            [appointment]="selected!"
            (saved)="onSaved()">
          </app-appointment-form>
        </div>
      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal fade show" tabindex="-1" [ngClass]="{'d-block': showView}" style="background-color: rgba(0,0,0,0.4);" *ngIf="showView && selected">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Appointment Details</h5>
          <button type="button" class="btn-close" (click)="showView = false"></button>
        </div>
        <div class="modal-body">
          <app-appointment-view
            [appointment]="selected!"
            (closed)="showView = false">
          </app-appointment-view>
        </div>
      </div>
    </div>
  </div>

  <!-- Inline Delete Confirmation -->
  <div *ngIf="deleteId" class="confirm-inline mt-2">
    <p>Do you want to Delete this appointment?</p>
    <button class="btn btn-danger btn-sm" (click)="confirmDelete()">Yes</button>
    <button class="btn btn-secondary btn-sm ms-2" (click)="deleteId = null">No</button>
  </div>
</div>
