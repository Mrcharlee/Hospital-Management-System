<div class="staff-list-container">
  <div class="staff-header mb-2">
    <button class="btn btn-primary" (click)="openAdd()">Add Staff</button>
  </div>

  <ag-grid-angular
    class="ag-theme-alpine"
    style="width: 100%; height: 500px"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [pagination]="true"
    [paginationPageSize]="10"
    [defaultColDef]="{ sortable: true, filter: true, resizable: true }"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>
</div>


<div class="modal fade show" *ngIf="showForm" style="display:block; background: rgba(0,0,0,0.4);">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ selected ? 'Edit Staff' : 'Add Staff' }}</h5>
        <button type="button" class="btn-close" (click)="showForm = false"></button>
      </div>
      <div class="modal-body">
        <app-staff-form [staff]="selected" (saved)="onSaved()"></app-staff-form>
      </div>
    </div>
  </div>
</div>


<div class="modal fade show" *ngIf="showView && selected" style="display:block; background: rgba(0,0,0,0.4);">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Staff Details</h5>
        <button type="button" class="btn-close" (click)="showView = false"></button>
      </div>
      <div class="modal-body">
        <app-staff-view [staff]="selected" (closed)="showView = false"></app-staff-view>
      </div>
    </div>
  </div>
</div>

<div class="modal fade show" *ngIf="showDeleteModal && selected" style="display:block; background: rgba(0,0,0,0.4);">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Staff</h5>
        <button type="button" class="btn-close" (click)="showDeleteModal = false"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete <strong>{{ selected.fullName }}</strong>?
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="showDeleteModal = false">Cancel</button>
        <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>
